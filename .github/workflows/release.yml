name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: kfs-tg-linux-amd64
          - target: x86_64-apple-darwin
            os: macos-13
            name: kfs-tg-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: kfs-tg-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: kfs-tg-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev zlib1g-dev libc++-dev libc++abi-dev

      - name: Build
        env:
          KFS_TG_API_ID: ${{ secrets.TG_API_ID }}
          KFS_TG_API_HASH: ${{ secrets.TG_API_HASH }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/kfs-tg ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/kfs-tg.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_TOKEN }}
          repository: k0fis/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "formula": "kfs-tg",
              "version": "${{ github.ref_name }}",
              "macos_amd64_url": "https://github.com/k0fis/kfs-tg/releases/download/${{ github.ref_name }}/kfs-tg-macos-amd64",
              "macos_arm64_url": "https://github.com/k0fis/kfs-tg/releases/download/${{ github.ref_name }}/kfs-tg-macos-arm64",
              "linux_amd64_url": "https://github.com/k0fis/kfs-tg/releases/download/${{ github.ref_name }}/kfs-tg-linux-amd64"
            }
