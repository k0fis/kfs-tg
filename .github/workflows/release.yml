name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: darwin, goarch: arm64, name: kfs-tg-macos-arm64}
          - {goos: darwin, goarch: amd64, name: kfs-tg-macos-amd64}
          - {goos: linux, goarch: amd64, name: kfs-tg-linux-amd64}
          - {goos: windows, goarch: amd64, name: kfs-tg-windows-amd64.exe}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags "-X main.version=$VERSION -X main.defaultApiID=$TG_API_ID -X main.defaultApiHash=$TG_API_HASH" -o ${{ matrix.name }} .
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  deb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: kfs-tg-linux-amd64
      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p pkg/DEBIAN pkg/usr/bin
          cp kfs-tg-linux-amd64 pkg/usr/bin/kfs-tg
          chmod +x pkg/usr/bin/kfs-tg
          cat > pkg/DEBIAN/control << EOF
          Package: kfs-tg
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: k0fis <k0fis@users.noreply.github.com>
          Description: Minimalist TUI Telegram client
          EOF
          sed -i 's/^          //' pkg/DEBIAN/control
          dpkg-deb --build pkg "kfs-tg_${VERSION}_amd64.deb"
      - uses: actions/upload-artifact@v7
        with:
          name: kfs-tg-deb
          path: "kfs-tg_*_amd64.deb"

  release:
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.TAP_TOKEN }}
          repository: k0fis/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "formula": "kfs-tg",
              "version": "${{ github.ref_name }}",
              "macos_amd64_url": "https://github.com/k0fis/kfs-tg/releases/download/${{ github.ref_name }}/kfs-tg-macos-amd64",
              "macos_arm64_url": "https://github.com/k0fis/kfs-tg/releases/download/${{ github.ref_name }}/kfs-tg-macos-arm64",
              "linux_amd64_url": "https://github.com/k0fis/kfs-tg/releases/download/${{ github.ref_name }}/kfs-tg-linux-amd64"
            }

  apt:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.TAP_TOKEN }}
          repository: k0fis/apt
          event-type: update-apt
          client-payload: |
            {
              "package": "kfs-tg",
              "version": "${{ steps.ver.outputs.version }}",
              "deb_url": "https://github.com/k0fis/kfs-tg/releases/download/${{ github.ref_name }}/kfs-tg_${{ steps.ver.outputs.version }}_amd64.deb"
            }
